model:
  dgcn_aggr: max
  dgcn_dim: 128
  edge_input_dim: 24
  edge_input_dim2: 368
  hidden_dim: 512
  imf_input_dim: 344
  imf_output_dim: 128
  name: BoxRFDGCNN
  node_input_dim: 8
  node_output_dim: 16
  option:
    conv_merge_type: null
    conv_num: 2
    conv_type: CustomDGC
    drop_egc: 0.0
    drop_ngc: 0.0
    edge_type: SEO
    feature_types:
    - bbox
    - text_pattern
    - rf
    normalization:
    - BBX
    - BRF
    - BTX
    - BIM
    - BFS
    training_noise: 0.0
    training_noise_prob: 0.0
  rf_output_dim: 120
  sample_k: 20
  txp_input_dim: 40
  txp_output_dim: 20
  type: DGCNN
